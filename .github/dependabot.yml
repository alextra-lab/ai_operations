version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Brussels
    open-pull-requests-limit: 5
    groups:
      pip-root:
        patterns:
          - "*"
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "chore(deps)"
      include: scope
    ignore:
      # transformers is managed by the /src/llm_guard_svc pip ecosystem scanner.
      # requirements-all.txt chains to it transitively, causing the root uv.lock
      # (dev-tools only) to be incorrectly flagged as the manifest. Ignore here
      # to suppress stale duplicate alerts 145-151; service scanner owns it.
      - dependency-name: "transformers"

  - package-ecosystem: npm
    directory: "/src/frontend-angular"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Keep the Angular framework and its build system / schematics in ONE
      # group. @angular-devkit/* and @ngtools/* must upgrade atomically with
      # @angular/* — splitting them across PRs produces an unbuildable state
      # (framework vN with build system vN-1). See PR #131/#132 fallout.
      angular:
        patterns:
          - "@angular/*"
          - "@angular-devkit/*"
          - "@ngtools/*"
          - "@schematics/*"
          - "angular-*"
          - "ng-packagr"
      npm-dev:
        dependency-type: development
        patterns:
          - "*"
        exclude-patterns:
          - "@angular/*"
          - "@angular-devkit/*"
          - "@ngtools/*"
          - "@schematics/*"
          - "angular-*"
          - "ng-packagr"
      npm-prod:
        dependency-type: production
        patterns:
          - "*"
    ignore:
      # Tailwind CSS v4 is a breaking migration (PostCSS plugin moved to
      # @tailwindcss/postcss, @tailwind directives -> @import "tailwindcss",
      # JS config -> CSS-first). Defer until migrated deliberately; bumping it
      # in the dev group silently breaks `ng build`. Unignore when ready.
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "chore(deps)"
      include: scope

  - package-ecosystem: docker
    directory: "/src/corpus_svc"
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: "/src/embedding"
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: "/src/inference-gateway"
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker

  - package-ecosystem: pip
    directory: "/src/llm_guard_svc"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Brussels
    open-pull-requests-limit: 5
    groups:
      pip-llm-guard-svc:
        patterns:
          - "*"
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "chore(deps)"
      include: scope

  - package-ecosystem: docker
    directory: "/src/llm_guard_svc"
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: "/src/orchestrator"
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: "/src/frontend-angular"
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(deps)"
