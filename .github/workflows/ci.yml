name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-lint:
    name: Python lint and type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit ruff black mypy

      - name: Run ruff
        run: ruff check src ops tests || true

      - name: Run black --check
        run: black --check src ops tests || true

      - name: Run mypy
        run: mypy src || true

  python-tests:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-all-no-llm-guard.txt
          pip install pytest pytest-asyncio

      - name: Run unit tests
        env:
          JWT_SECRET: ci-jwt-secret-32chars-minimum-padding
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
        run: |
          pytest src --maxfail=10 -q || true

  frontend-lint:
    name: Frontend lint and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend-angular
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: src/frontend-angular/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Test
        run: npm test -- --watch=false --browsers=ChromeHeadless || true

      # Hard gate: the production build must succeed. Lint/test above carry
      # pre-existing failures masked with `|| true`; the build did not run at
      # all before, which let breaking dependency bumps pass CI green.
      - name: Build
        run: npm run build

  security:
    name: Dependency security scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: src/frontend-angular/package-lock.json

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Run pip-audit
        run: |
          # GHSA-rrmf-rvhw-rf47: torch <= 2.12.0 memory corruption via
          # torch.jit.script. LOW severity, no patched version exists (affects
          # all releases), and this platform never JIT-scripts untrusted input
          # (torch is used only for embedding inference + llm-guard scanners).
          # Remove this ignore once PyTorch ships a fixed release.
          pip-audit -r requirements-all-no-llm-guard.txt \
            --ignore-vuln GHSA-rrmf-rvhw-rf47

      - name: Install frontend dependencies
        working-directory: src/frontend-angular
        run: npm ci

      - name: Run npm audit (high+, production deps)
        working-directory: src/frontend-angular
        # --omit=dev: gate on dependencies that actually ship in the production bundle.
        # The remaining high advisories are all build/dev tooling (esbuild, vite,
        # @angular-devkit/build-angular) whose only "fix" is a breaking toolchain
        # downgrade and whose attack surface is the local dev server (`ng serve`),
        # never the deployed nginx image. Production deps must stay clean.
        run: npm audit --audit-level=high --omit=dev
