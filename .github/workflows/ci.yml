name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-lint:
    name: Python lint and type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit ruff black mypy

      - name: Run ruff
        run: ruff check src ops tests || true

      - name: Run black --check
        run: black --check src ops tests || true

      - name: Run mypy
        run: mypy src || true

  python-tests:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-all-no-llm-guard.txt
          pip install pytest pytest-asyncio

      - name: Run unit tests
        env:
          JWT_SECRET: ci-jwt-secret-32chars-minimum-padding
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
        run: |
          pytest src --maxfail=10 -q || true

  frontend-lint:
    name: Frontend lint and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend-angular
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: src/frontend-angular/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Test
        run: npm test -- --watch=false --browsers=ChromeHeadless || true

  security:
    name: Dependency security scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: src/frontend-angular/package-lock.json

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Run pip-audit
        run: |
          pip-audit -r requirements-all-no-llm-guard.txt

      - name: Install frontend dependencies
        working-directory: src/frontend-angular
        run: npm ci

      - name: Run npm audit (high+)
        working-directory: src/frontend-angular
        run: npm audit --audit-level=high
