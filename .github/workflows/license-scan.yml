name: License scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  pip-licenses:
    name: pip-licenses report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies + pip-licenses
        run: |
          python -m pip install --upgrade pip
          pip install pip-licenses
          pip install -r requirements-all-no-llm-guard.txt || pip install -r requirements-all.txt

      - name: Generate Markdown license report
        run: |
          pip-licenses \
            --format=markdown \
            --with-urls \
            --with-description \
            --output-file=license-report.md
          cat license-report.md

      - name: Generate CSV license report
        run: |
          pip-licenses \
            --format=csv \
            --with-urls \
            --with-description \
            --output-file=license-report.csv

      - name: Fail on copyleft licenses
        run: |
          set -e
          echo "Checking for copyleft licenses that are incompatible with MIT distribution..."
          # Match GPL/AGPL/LGPL except permitted LGPL libraries (psycopg, chardet, intbitset, astroid).
          # Adjust the allowlist if you intentionally add new LGPL deps.
          if pip-licenses --format=plain-vertical | \
              grep -E "^License: .*(AGPL|^GPL-)" -B1 -A1; then
            echo "::error::Disallowed copyleft license found in dependency tree."
            exit 1
          fi
          echo "OK: no AGPL or GPL deps found."

      - name: Upload license report artifact
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: |
            license-report.md
            license-report.csv
          retention-days: 30
