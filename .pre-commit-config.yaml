# Pre-commit hooks for AI Operations Platform
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
# See https://pre-commit.com/
#
# To skip a hook for one commit: SKIP=mypy git commit -m "..."

default_language_version:
  python: python3

repos:
  # Built-in hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: ^src/frontend-angular/tsconfig\.(json|spec\.json|app\.json)$
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: debug-statements

  # Ruff: lint (project uses pyproject.toml for config)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]

  # Black: formatting (project standard per README / Dependency_Management)
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3
        files: ^(src/|tests/|ops/|conftest\.py)

  # mypy: type check (uses mypy.ini; src/tests/ops only, venv excluded)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        pass_filenames: false
        args: [--config-file, mypy.ini, src, tests, ops]
        additional_dependencies:
          - types-PyYAML
          - types-requests
          - types-cachetools
          - types-redis
