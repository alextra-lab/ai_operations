services:
  ui-webapp:
    build:
      context: ../src/frontend
      dockerfile: Dockerfile
    container_name: ui-webapp
    ports:
      - "8501:8501"
    depends_on:
      - orchestrator-api
    environment:
      - ENV=development

  orchestrator-api:
    build:
      context: ../src/backend
      dockerfile: Dockerfile
    container_name: orchestrator-api
    ports:
      - "8000:8000"
    environment:
      - ENV=development
    depends_on:
      - postgres-db
      - vector-db
      - llm-guard

  postgres-db:
    image: postgres:13
    container_name: postgres-db
    restart: always
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=aio

  vector-db:
    image: qdrant/qdrant
    container_name: vector-db
    restart: always
    volumes:
      - qdrant-data:/qdrant/storage

  llm-service:
    image: python:3.11-slim
    container_name: llm-service
    working_dir: /app
    volumes:
      - ../src/backend:/app
    command: python llm_service.py
    ports:
      - "8080:8080"
    environment:
      - ENV=development

  llm-guard:
    image: llm-guard-with-models:latest
    container_name: llm-guard
    ports:
      - "8081:8081"
    volumes:
      - ../data/llm-guard-models:/app/models
    environment:
      - ENV=development
      - LOG_LEVEL=INFO
      - HF_HUB_DISABLE_PROGRESS_BARS=1
      - TRANSFORMERS_VERBOSITY=error
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: always

volumes:
  postgres-data:
  qdrant-data:
