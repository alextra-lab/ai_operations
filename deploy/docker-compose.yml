services:
  ui-webapp:
    build:
      context: ../src
      dockerfile: frontend-angular/Dockerfile
    container_name: ui-webapp
    networks: [observability]
    profiles: [full]
    ports:
      - "4200:80"
    depends_on:
      orchestrator-api:
        condition: service_healthy
    environment:
      - ENV=${ENV:-production}
      - TESTING=${TESTING:-0}
      - DEVELOPMENT=${DEVELOPMENT:-0}
      - SERVICE_VERSION=${SERVICE_VERSION}
      - API_BASE_URL=http://orchestrator-api:8000
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: always
    platform: linux/arm64

  orchestrator-api:
    build:
      context: ../src
      dockerfile: orchestrator/Dockerfile
    container_name: orchestrator-api
    networks: [observability]
    ports:
      - "18000:8000"
    environment:
      - ENV=${ENV:-development}
      - TESTING=${TESTING:-0}
      - DEVELOPMENT=${DEVELOPMENT:-1}
      - SERVICE_VERSION=${SERVICE_VERSION}
      # Database Configuration
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - DATABASE_URL=${DATABASE_URL}
      # Vector Database Configuration
      - QDRANT_HOST=${QDRANT_HOST:-vector-db}
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION}
      # Authentication Configuration
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ISSUER=${JWT_ISSUER:-ai-operations-platform}
      - TOOL_SECRETS_KEY=${TOOL_SECRETS_KEY}
      # LLM Configuration
      - LLM_LOCAL_BASE_URL=${LLM_LOCAL_BASE_URL}
      - LLM_LOCAL_API_KEY=${LLM_LOCAL_API_KEY}
      - LLM_REMOTE_BASE_URL=${LLM_REMOTE_BASE_URL}
      - LLM_REMOTE_API_KEY=${LLM_REMOTE_API_KEY}
      - LLMAAS_BASE_URL=${LLMAAS_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - INFERENCE_GATEWAY_URL=${INFERENCE_GATEWAY_URL:-http://inference-gateway:8002/v1}
      # Service Dependencies
      - CORPUS_SVC_URL=${CORPUS_SVC_URL:-http://corpus-service:8001/api/v1}
      - RETRIEVAL_SVC_URL=${CORPUS_SVC_URL:-http://corpus-service:8001/api/v1} # Legacy compatibility
      - EMBEDDING_SERVICE_URL=${EMBEDDING_SERVICE_URL}
      - LLM_GUARD_SERVICE_URL=${LLM_GUARD_SERVICE_URL}
      # Pricing Configuration
      - PRICING_DEFAULT_INPUT_PER_MILLION=${PRICING_DEFAULT_INPUT_PER_MILLION:-0.0}
      - PRICING_DEFAULT_OUTPUT_PER_MILLION=${PRICING_DEFAULT_OUTPUT_PER_MILLION:-0.0}
      # Dashboard Health Monitoring
      - DASHBOARD_HEALTH_ENDPOINTS=${DASHBOARD_HEALTH_ENDPOINTS:-}
      - REDIS_URL=${REDIS_URL:-redis://redis-cache:6379}
    depends_on:
      postgres-db:
        condition: service_healthy
      vector-db:
        condition: service_healthy
      corpus-service:
        condition: service_healthy
      inference-gateway:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: always
    platform: linux/arm64

  postgres-db:
    image: postgres:17.6
    #image: arm64v8/postgres:17.4
    container_name: postgres-db
    networks: [observability]
    restart: always
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports: # Add this section
      - "5532:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-aio}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    platform: linux/arm64

  db-init:
    build:
      context: ..
      dockerfile: ops/database/Dockerfile
    container_name: db-init
    networks: [observability]
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      # Optional: provide these to seed intent model defaults from env
      - INTENT_MODEL_QUERY=${INTENT_MODEL_QUERY:-}
      - INTENT_MODEL_RULE_GENERATION=${INTENT_MODEL_RULE_GENERATION:-}
      - INTENT_MODEL_SUMMARIZATION=${INTENT_MODEL_SUMMARIZATION:-}
      - INTENT_MODEL_ENRICHMENT=${INTENT_MODEL_ENRICHMENT:-}
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: "no"
    platform: linux/arm64

  vector-db:
    image: qdrant/qdrant:v1.16.0
    container_name: vector-db
    networks: [observability]
    restart: always
    ports:
      - "6333:6333" # REST API port
      - "6334:6334" # gRPC port
    volumes:
      - ../data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/localhost/6333"]
      interval: 15s # Check more frequently during startup
      timeout: 5s
      retries: 5 # Allow more retries
      start_period: 10s
    platform: linux/arm64

  llm-guard-svc:
    build:
      context: ../src
      dockerfile: llm_guard_svc/Dockerfile
    container_name: llm-guard-svc
    networks: [observability]
    profiles: [full]
    ports:
      - "18081:8081"
    volumes:
      - ../data/llm-guard-models:/app/models:cached
    environment:
      - ENV=${ENV:-development}
      - TESTING=${TESTING:-0}
      - DEVELOPMENT=${DEVELOPMENT:-1}
      - SERVICE_VERSION=${SERVICE_VERSION}
      # Logging Configuration
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # LLM Guard Service Configuration
      - LLM_GUARD_ENABLED=${LLM_GUARD_ENABLED:-true}
      - LLM_GUARD_HOST=${LLM_GUARD_HOST:-0.0.0.0}
      - LLM_GUARD_PORT=${LLM_GUARD_PORT:-8081}
      - LLM_GUARD_DEBUG=${LLM_GUARD_DEBUG:-false}
      - LLM_GUARD_ENABLE_CORS=${LLM_GUARD_ENABLE_CORS:-true}
      - LLM_GUARD_CORS_ORIGINS=${LLM_GUARD_CORS_ORIGINS:-*}
      - LLM_GUARD_FAIL_FAST=${LLM_GUARD_FAIL_FAST:-false}
      - LLM_GUARD_CACHE_ENABLED=${LLM_GUARD_CACHE_ENABLED:-true}
      - LLM_GUARD_CACHE_MAX_SIZE=${LLM_GUARD_CACHE_MAX_SIZE:-1000}
      - LLM_GUARD_CACHE_TTL_SECONDS=${LLM_GUARD_CACHE_TTL_SECONDS:-3600}
      - LLM_GUARD_MODELS_PATH=${LLM_GUARD_MODELS_PATH:-/app/models}
      - LLM_GUARD_SERVICE_URL=${LLM_GUARD_SERVICE_URL}
      # HuggingFace Configuration
      - HF_HUB_DISABLE_PROGRESS_BARS=1
      - TRANSFORMERS_VERBOSITY=error
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: always
    platform: linux/arm64

  corpus-service:
    build:
      context: ../src/
      dockerfile: corpus_svc/Dockerfile
    container_name: corpus-service
    networks: [observability]
    volumes:
      # Mount temporary space for processing
      - ../data/retrieval/tmp:/data/tmp
    ports:
      - "18001:8001"
    environment:
      - ENV=${ENV:-development}
      - TESTING=${TESTING:-0}
      - DEVELOPMENT=${DEVELOPMENT:-1}
      - SERVICE_VERSION=v1 # API version prefix - hardcoded to match expected /api/v1 routes
      # Authentication Configuration
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ISSUER=${JWT_ISSUER:-ai-operations-platform}
      - TOOL_SECRETS_KEY=${TOOL_SECRETS_KEY}
      # Logging Configuration
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # OpenTelemetry Configuration
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-aio}
      - OTEL_SERVICE_VERSION=${OTEL_SERVICE_VERSION}
      # Database Configuration
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - DATABASE_URL=${DATABASE_URL}
      # Vector Database Configuration
      - QDRANT_HOST=${QDRANT_HOST:-vector-db}
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-documents}
      - QDRANT_VECTOR_SIZE=${QDRANT_VECTOR_SIZE:-384}
      - QDRANT_HNSW_M=${QDRANT_HNSW_M:-16}
      - QDRANT_HNSW_EF_CONSTRUCT=${QDRANT_HNSW_EF_CONSTRUCT:-100}
      # Corpus Service Configuration
      - CORPUS_HOST=${CORPUS_HOST:-0.0.0.0}
      - CORPUS_PORT=${CORPUS_PORT:-8001}
      - CORPUS_DEBUG=${CORPUS_DEBUG:-false}
      - CORPUS_ENABLE_CORS=${CORPUS_ENABLE_CORS:-true}
      - CORPUS_CORS_ORIGINS=${CORPUS_CORS_ORIGINS:-*}
      - CORPUS_EMBEDDING_SERVICE_TOKEN=${CORPUS_EMBEDDING_SERVICE_TOKEN}
      - CORPUS_DOCUMENTS_PATH=${CORPUS_DOCUMENTS_PATH:-/data/documents}
      - CORPUS_TEMP_PATH=${CORPUS_TEMP_PATH:-/data/tmp}
      - CORPUS_CHUNK_SIZE=${CORPUS_CHUNK_SIZE:-1000}
      - CORPUS_CHUNK_OVERLAP=${CORPUS_CHUNK_OVERLAP:-200}
      - CORPUS_MAX_CHUNKS_PER_DOCUMENT=${CORPUS_MAX_CHUNKS_PER_DOCUMENT:-1000}
      - CORPUS_SERVICE_URL=${CORPUS_SERVICE_URL}
      # Service Dependencies
      - EMBEDDING_SERVICE_URL=${EMBEDDING_SERVICE_URL:-http://embedding-service:8000}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-minilm-l6-v2}
    depends_on:
      postgres-db:
        condition: service_healthy
      vector-db:
        condition: service_healthy
      embedding-service:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; import sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8001/health', timeout=5).getcode() == 200 else sys.exit(1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always
    platform: linux/arm64

  embedding-service:
    build:
      context: ../src
      dockerfile: embedding/Dockerfile
    container_name: embedding-service
    networks: [observability]
    volumes:
      # Mount model cache
      - ../data/models:/opt/models:cached
    ports:
      - "18005:8000"
    environment:
      - ENV=${ENV:-development}
      - TESTING=${TESTING:-0}
      - DEVELOPMENT=${DEVELOPMENT:-1}
      - SERVICE_VERSION=${SERVICE_VERSION}
      # Authentication Configuration
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ISSUER=${JWT_ISSUER:-ai-operations-platform}
      - TOOL_SECRETS_KEY=${TOOL_SECRETS_KEY}
      # Logging Configuration
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # OpenTelemetry Configuration
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-aio}
      - OTEL_SERVICE_VERSION=${OTEL_SERVICE_VERSION}
      # Embedding Service Configuration
      - EMBEDDING_HOST=${EMBEDDING_HOST:-0.0.0.0}
      - EMBEDDING_PORT=${EMBEDDING_PORT:-8000}
      - EMBEDDING_DEBUG=${EMBEDDING_DEBUG:-false}
      - EMBEDDING_ENABLE_CORS=${EMBEDDING_ENABLE_CORS:-true}
      - EMBEDDING_CORS_ORIGINS=${EMBEDDING_CORS_ORIGINS:-*}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-minilm-l6-v2}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-384}
      - EMBEDDING_MODEL_CACHE_DIR=${EMBEDDING_MODEL_CACHE_DIR:-/opt/models}
      - EMBEDDING_ENABLE_MODEL_CACHING=${EMBEDDING_ENABLE_MODEL_CACHING:-true}
      - EMBEDDING_BATCH_SIZE=${EMBEDDING_BATCH_SIZE:-32}
      - EMBEDDING_CLIENT_TIMEOUT_SECONDS=${EMBEDDING_CLIENT_TIMEOUT_SECONDS:-30}
      - EMBEDDING_CLIENT_MAX_RETRIES=${EMBEDDING_CLIENT_MAX_RETRIES:-3}
      - EMBEDDING_SERVICE_URL=${EMBEDDING_SERVICE_URL}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; import sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health', timeout=5).getcode() == 200 else sys.exit(1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always
    platform: linux/arm64

  redis-cache:
    image: redis:7-alpine
    container_name: redis-cache
    networks: [observability]
    ports:
      - "6379:6379"
    volumes:
      - ../data/redis:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    platform: linux/arm64

  inference-gateway:
    build:
      context: ../src
      dockerfile: inference-gateway/Dockerfile
    container_name: inference-gateway
    networks: [observability]
    ports:
      - "18002:8002"
    environment:
      - ENV=${ENV:-production}
      - TESTING=${TESTING:-0}
      - DEVELOPMENT=${DEVELOPMENT:-0}
      - SERVICE_VERSION=${SERVICE_VERSION}
      # Database Configuration
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      # Authentication Configuration
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ISSUER=${JWT_ISSUER:-ai-operations-platform}
      # Logging Configuration
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDACT_LOGS=${REDACT_LOGS:-true}
      - LOG_REDACTION_LEVEL=${LOG_REDACTION_LEVEL:-partial}
      # Gateway Configuration
      - GATEWAY_HOST=${GATEWAY_HOST:-0.0.0.0}
      - GATEWAY_PORT=${GATEWAY_PORT:-8002}
      - GATEWAY_DEBUG=${GATEWAY_DEBUG:-false}
      - GATEWAY_ENABLE_CORS=${GATEWAY_ENABLE_CORS:-true}
      - GATEWAY_CORS_ORIGINS=${GATEWAY_CORS_ORIGINS:-*}
      # Redis Configuration
      - REDIS_URL=${REDIS_URL:-redis://redis-cache:6379}
      - REDIS_ENABLED=${REDIS_ENABLED:-true}
      - REDIS_MAX_CONNECTIONS=${REDIS_MAX_CONNECTIONS:-50}
      - REDIS_SOCKET_TIMEOUT=${REDIS_SOCKET_TIMEOUT:-5}
      - REDIS_SOCKET_CONNECT_TIMEOUT=${REDIS_SOCKET_CONNECT_TIMEOUT:-5}
      # Rate Limiting Configuration
      - GATEWAY_RATE_LIMITING_ENABLED=${GATEWAY_RATE_LIMITING_ENABLED:-true}
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always
    platform: linux/arm64

networks:
  observability:
    external: true
