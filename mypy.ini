# =============================================================================
# MYPY CONFIGURATION - AI Operations Platform
# =============================================================================
#
# PHILOSOPHY:
# -----------
# Type checking should catch real bugs without becoming a burden. This config:
#
# 1. CATCHES REAL BUGS in annotated code:
#    - Wrong argument types, incompatible assignments, attribute errors
#    - None access without checks (strict_optional)
#    - Incomplete function signatures (if you start typing, finish it)
#
# 2. AVOIDS NOISE:
#    - No cast ping-pong (warn_return_any OFF)
#    - No redundant cast warnings (conflicts with fixing no-any-return)
#    - No false "unreachable" from SQLAlchemy/defensive code
#
# 3. DIFFERENT STRICTNESS FOR DIFFERENT CODE:
#    - src/: Requires annotations, full checking
#    - tests/, ops/: Relaxed, no forced annotations
#
# RUN: python -m mypy --config-file mypy.ini src tests ops
#
# ERROR PRIORITY (fix in this order):
# -----------------------------------
# 1. attr-defined, call-arg, arg-type - Real bugs, wrong API usage
# 2. assignment, return-value - Type mismatches
# 3. union-attr, operator, index - Need type narrowing or better types
# 4. no-untyped-def - Gradual, fix when touching code
# 5. var-annotated - Low priority, fix opportunistically
#
# =============================================================================

[mypy]
python_version = 3.12
explicit_package_bases = True

# Exclude conftest.py files (pytest fixtures, causes duplicate module errors)
# Exclude venv so "mypy ." does not type-check installed packages
exclude = (?x)(
    ^docs/archive/
    | /conftest\.py$
    | ^venv/
  )

# -----------------------------------------------------------------------------
# Settings that CATCH BUGS (keep these on)
# -----------------------------------------------------------------------------

# Require functions with some annotations to have all annotations
disallow_incomplete_defs = True

# Check inside untyped functions (when combined with disallow_untyped_defs=True,
# this only checks annotated functions)
check_untyped_defs = True

# def f(x: str = None) is wrong - require def f(x: str | None = None)
no_implicit_optional = True

# Distinguish None from other types
strict_optional = True

# Warn if function doesn't return on all paths
warn_no_return = True

# Warn about unused mypy config
warn_unused_configs = True

# -----------------------------------------------------------------------------
# Settings we TURN OFF to reduce noise
# -----------------------------------------------------------------------------

# OFF: "Returning Any from function declared to return X"
# This causes cast ping-pong. Real safety comes from input types.
warn_return_any = False

# OFF: "Redundant cast to X"
# This conflicts with fixing no-any-return errors. Can't win both.
warn_redundant_casts = False

# OFF: "Statement is unreachable"
# Too many false positives from SQLAlchemy Column types and defensive code.
warn_unreachable = False

# Allow calling functions without type annotations
disallow_untyped_calls = False

# Allow decorators without type annotations (FastAPI, pytest)
disallow_untyped_decorators = False

# Global: ignore missing type stubs
ignore_missing_imports = True

# =============================================================================
# PER-MODULE: src/ (production code) - STRICT
# =============================================================================
# Require annotations on all functions. This is where type safety matters most.

[mypy-src.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True

# -----------------------------------------------------------------------------
# Service-internal tests get relaxed rules
# -----------------------------------------------------------------------------
[mypy-src.*.tests.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = False

# -----------------------------------------------------------------------------
# Verbatim MIT ports/vendoring from llm-guard (LLG-04) — not type-gated here.
# Kept byte-for-byte for parity; see app/scanners/secrets_plugins/PROVENANCE.md.
# -----------------------------------------------------------------------------
[mypy-src.llm_guard_svc.app.scanners.secrets_scanner]
ignore_errors = True

[mypy-src.llm_guard_svc.app.scanners.secrets_plugins.*]
ignore_errors = True

# =============================================================================
# PER-MODULE: tests/ (test suites) - RELAXED
# =============================================================================
# Tests use mocks, fixtures, and dynamic patterns. Don't force annotations.

[mypy-tests.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = False

# =============================================================================
# PER-MODULE: ops/ (scripts) - VERY RELAXED
# =============================================================================
# Demo scripts, verification scripts, utilities. Minimal type checking.

[mypy-ops.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = False

# =============================================================================
# EXTERNAL LIBRARIES (ignore missing stubs)
# =============================================================================

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-starlette.*]
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True

[mypy-jose.*]
ignore_missing_imports = True

[mypy-passlib.*]
ignore_missing_imports = True

[mypy-aiohttp.*]
ignore_missing_imports = True

