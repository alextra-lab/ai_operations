[tool:pytest]
# Pytest configuration
testpaths = src scripts
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Exclude problematic temporary scripts and app code that matches test_* pattern
ignore =
    temp_scripts/
    tests/integration/test_delete_process.py
    src/corpus_svc/app/services/test_suite_service.py
    src/corpus_svc/app/routers/test_suites.py
    src/corpus_svc/app/schemas/test_suite.py
    src/inference-gateway/app/services/test_suite_service.py
    src/inference-gateway/app/routers/test_suites.py
    src/inference-gateway/app/schemas/test_suite.py

# Async test configuration
asyncio_mode = auto

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings configuration
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::RuntimeWarning:asyncio
