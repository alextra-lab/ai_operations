# Default configuration for embedding service
#
# Both providers below ship DISABLED. Out of the box the service starts but has no
# active embedding provider, so requests return 503 "No providers available" until an
# operator explicitly enables one. Nothing defaults to a remote server or to the local
# torch backend. To use a provider, set its `enabled: true` (and for `local`, build the
# image with WITH_LOCAL_EMBEDDING=1 so torch/sentence-transformers are installed).

default_provider: null

providers:
  # OpenAI-compatible provider configuration (example: local inference server)
  - name: openai
    type: OPENAI_COMPATIBLE
    enabled: false
    priority: 10
    connection:
      url: http://host.docker.internal:1234/v1
      auth_type: API_KEY
      api_key_env: OPENAI_API_KEY
      timeout_seconds: 60
      max_retries: 3
    models:
      - name: text-embedding-nomic-embed-text-v1.5
        dimensions: 768
        server_model_name: text-embedding-nomic-embed-text-v1.5@q4_k_m
        default: true
        batch_size: 16
      - name: text-embedding-bge-m3
        dimensions: 1024
        server_model_name: text-embedding-bge-m3
        default: false
        batch_size: 8

  # Local model provider (torch + sentence-transformers; requires WITH_LOCAL_EMBEDDING=1 build)
  - name: local
    type: LOCAL_MODEL
    enabled: false
    priority: 20
    models:
      - name: all-minilm-l6-v2
        dimensions: 384
        path: /opt/models/all-minilm-l6-v2
        default: true
        batch_size: 16
