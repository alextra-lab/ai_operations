worker_processes auto;
error_log /var/log/nginx/error.log debug;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Allow larger file uploads (100MB)
    client_max_body_size 100M;

    # Enhanced logging to debug the issue
    log_format debug_format '$remote_addr - $remote_user [$time_local] "$request" '
                           '$status $body_bytes_sent "$http_referer" '
                           '"$http_user_agent" "$http_x_forwarded_for" '
                           'upstream: "$upstream_addr" '
                           'upstream_status: "$upstream_status" '
                           'request_time: "$request_time" '
                           'upstream_response_time: "$upstream_response_time"';

    access_log /var/log/nginx/access.log debug_format;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Gateway Admin API - P3-T1 Provider Management & P3-T2 Metrics
        location ^~ /api/admin/gateway/ {
            access_log /var/log/nginx/gateway-admin.log debug_format;

            # Proxy to Inference Gateway admin endpoints
            # /api/admin/gateway/metrics/* -> http://gateway:8007/admin/metrics/*
            # /api/admin/gateway/providers/* -> http://gateway:8007/admin/providers/*
            proxy_pass http://inference-gateway-test:8007/admin/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for admin operations
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;

            # Add debug headers
            add_header X-Debug-Location "gateway-admin" always;
        }

        # Gateway Public API (for future use)
        location ^~ /api/gateway/ {
            access_log /var/log/nginx/gateway.log debug_format;

            # Proxy to Inference Gateway public endpoints
            proxy_pass http://inference-gateway-test:8007/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for admin operations
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;

            # Add debug headers
            add_header X-Debug-Location "gateway-public" always;
        }

        # API proxy - EXACT match first to test
        location ^~ /api/ {
            access_log /var/log/nginx/api.log debug_format;

            # Simple proxy configuration for testing
            proxy_pass http://orchestrator-api:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE (Server-Sent Events) specific configuration
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
            proxy_send_timeout 24h;

            # Prevent nginx from closing the connection
            proxy_set_header Connection '';
            proxy_set_header X-Accel-Buffering no;

            # Add debug headers
            add_header X-Debug-Location "api-proxy" always;
        }

        # Static files
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Debug-Location "static-files" always;
        }

        # Angular routing - LAST
        location / {
            try_files $uri $uri/ /index.html;
            add_header X-Debug-Location "angular-routing" always;
        }
    }
}
