<h2 mat-dialog-title>
  Active Sessions: {{ data.user.username }}
  <button
    mat-icon-button
    (click)="loadSessions()"
    matTooltip="Refresh"
    aria-label="Refresh sessions"
  >
    <lucide-icon name="refresh-cw"></lucide-icon>
  </button>
</h2>

<mat-dialog-content>
  <!-- Error Message -->
  <div *ngIf="error" class="error-message" role="alert">
    {{ error }}
  </div>

  <!-- Loading State -->
  <div
    *ngIf="isLoading"
    class="loading-container"
    role="status"
    aria-live="polite"
  >
    Loading sessions...
  </div>

  <!-- Sessions Table -->
  <div *ngIf="!isLoading && !error" class="sessions-table-container">
    <table
      mat-table
      [dataSource]="sessions"
      *ngIf="sessions.length > 0"
      class="sessions-table"
    >
      <!-- Created At Column -->
      <ng-container matColumnDef="created_at">
        <th mat-header-cell *matHeaderCellDef>Created</th>
        <td mat-cell *matCellDef="let session">
          {{ session.created_at | date: 'short' }}
        </td>
      </ng-container>

      <!-- Last Activity Column -->
      <ng-container matColumnDef="last_activity">
        <th mat-header-cell *matHeaderCellDef>Last Activity</th>
        <td mat-cell *matCellDef="let session">
          {{ session.last_activity | date: 'short' }}
        </td>
      </ng-container>

      <!-- Expires At Column -->
      <ng-container matColumnDef="expires_at">
        <th mat-header-cell *matHeaderCellDef>Expires</th>
        <td mat-cell *matCellDef="let session">
          {{ session.expires_at | date: 'short' }}
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let session">
          <button
            mat-icon-button
            color="warn"
            (click)="forceLogout(session)"
            matTooltip="Force logout"
            [attr.aria-label]="
              'Force logout session created at ' +
              (session.created_at | date: 'short')
            "
          >
            <lucide-icon name="log-out"></lucide-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <!-- Empty State -->
    <div *ngIf="sessions.length === 0" class="empty-state">
      <lucide-icon name="calendar-x"></lucide-icon>
      <p>No active sessions</p>
    </div>
  </div>

  <div class="info-box">
    <lucide-icon name="info"></lucide-icon>
    <p>Sessions auto-refresh every 30 seconds</p>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onClose()">Close</button>
</mat-dialog-actions>
