<!-- Compact Breadcrumb Navigation - Mobile-first, practical design -->
@if (breadcrumbs().length > 0) {
  <nav
    class="breadcrumb-container flex items-center min-w-0"
    aria-label="Breadcrumb navigation"
  >
    <!-- Show only last 2 items on mobile, more on desktop -->
    <div class="breadcrumb-content flex items-center font-medium">
      <!-- Mobile: Show only current page -->
      <span class="current-page md:hidden" [attr.aria-current]="'page'">
        @if (getLastBreadcrumb()?.icon) {
          <lucide-icon class="text-base w-4 h-4 mr-1" [name]="getLastBreadcrumb()?.icon"></lucide-icon>
        }
        {{ getLastBreadcrumb()?.label }}
      </span>

      <!-- Desktop: Show breadcrumb trail -->
      @if (breadcrumbs().length > 1) {
        <ol
          class="breadcrumb-trail hidden md:flex items-center list-none m-0 p-0"
        >
          <!-- Show parent breadcrumb if exists -->
          <li class="flex items-center">
            <button
              mat-button
              class="breadcrumb-button"
              [disabled]="
                getParentBreadcrumb()
                  ? isBreadcrumbDisabled(getParentBreadcrumb()!)
                  : false
              "
              [attr.aria-label]="'Go to ' + getParentBreadcrumb()?.label"
              (click)="
                getParentBreadcrumb() &&
                  onBreadcrumbClick(getParentBreadcrumb()!)
              "
            >
              {{ getParentBreadcrumb()?.label }}
            </button>

            <!-- Separator -->
            <lucide-icon class="text-base w-4 h-4 mx-1" aria-hidden="true" name="chevron-right"></lucide-icon>
          </li>

          <!-- Current page -->
          <li class="current-page font-medium" [attr.aria-current]="'page'">
            {{ getLastBreadcrumb()?.label }}
          </li>
        </ol>
      }

      <!-- Fallback: Just show current page on desktop if only one breadcrumb -->
      @if (breadcrumbs().length === 1) {
        <span class="current-page hidden md:block" [attr.aria-current]="'page'">
          {{ getLastBreadcrumb()?.label }}
        </span>
      }
    </div>
  </nav>
}
